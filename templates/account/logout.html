{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 420px; padding: 120px 0;">
    <div class="card" style="padding: 2.5rem; text-align: center;">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">👋</div>
        <h2 style="margin-bottom: 0.5rem;">¿Cerrar sesión?</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Tu sesión de PideYa se cerrará.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-dark" style="width: 100%; padding: 0.9rem;">Sí, cerrar sesión</button>
        </form>
        <a href="/" style="display: block; margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Cancelar</a>
    </div>
</div>
{% endblock %}
