{% extends 'base.html' %}

{% block content %}
<div class="dash-layout" style="display: flex; min-height: calc(100vh - 70px);">
    <!-- Sidebar -->
    <aside class="sidebar" style="width: 280px; background: white; border-right: 1px solid var(--border); padding: 20px;">
        <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
            <p style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; margin-bottom: 5px;">📍 Local Actual</p>
            <div style="font-weight: 700; font-size: 1.1rem; color: var(--secondary);">{{ business.name }}</div>
            <a href="{% url 'dashboard:home' %}" style="font-size: 0.8rem; color: var(--text-muted); text-decoration: underline;">Cambiar de local</a>
        </div>

        <div style="margin-bottom: 30px;">
            <p style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; margin-bottom: 10px;">Gestión y Cierre</p>
            <nav class="side-nav">
                <a href="{% url 'dashboard:waiter_dashboard' business.slug %}" class="nav-item">🧑‍🍳 Monitor Pedidos</a>
                <a href="{% url 'dashboard:caja_dashboard' business.slug %}" class="nav-item">💰 Caja y Cierre</a>
                <a href="{% url 'dashboard:staff_list' business.slug %}" class="nav-item">👥 Gestión Staff</a>
                <a href="{% url 'dashboard:product_list' business.slug %}" class="nav-item">🍔 Gestionar Menú</a>
                <a href="{% url 'dashboard:table_list' business.slug %}" class="nav-item">🪑 Mesas y QR</a>
            </nav>
        </div>
    </aside>

    <!-- Main Section -->
    <section class="dash-content" style="flex: 1; padding: 40px; background-color: #fdfdfd;">
        <div class="container-fluid">
            {% block dash_content %}{% endblock %}
        </div>
    </section>
</div>

<style>
    .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        text-decoration: none;
        color: var(--text);
        font-weight: 500;
        border-radius: 8px;
        transition: var(--transition);
        margin-bottom: 4px;
        font-size: 0.9rem;
    }
    .nav-item:hover {
        background: #f1f1f1;
        color: var(--secondary);
    }
    .nav-item.active {
        background: var(--primary);
        color: var(--secondary);
        font-weight: 700;
    }
</style>
{% endblock %}
