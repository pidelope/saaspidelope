{% extends 'base.html' %}

{% block content %}
<div class="dash-container">
    <!-- Sidebar (Desktop) -->
    <aside class="sidebar-desktop">
        <div class="sidebar-header">
            <p class="label">📍 Local Actual</p>
            <h3 class="business-name">{{ business.name }}</h3>
            <a href="{% url 'dashboard:home' %}" class="change-link">Cambiar de local</a>
        </div>

        <nav class="side-nav">
            <a href="{% url 'dashboard:waiter_dashboard' business.slug %}" class="nav-item {% if 'monitor' in request.path %}active{% endif %}">
                <span class="icon">🧑‍🍳</span> Monitor Pedidos
            </a>
            <a href="{% url 'dashboard:caja_dashboard' business.slug %}" class="nav-item {% if 'caja' in request.path %}active{% endif %}">
                <span class="icon">💰</span> Caja y Cierre
            </a>
            <a href="{% url 'dashboard:table_list' business.slug %}" class="nav-item {% if 'tables' in request.path %}active{% endif %}">
                <span class="icon">🪑</span> Mesas y QR
            </a>
            <a href="{% url 'dashboard:product_list' business.slug %}" class="nav-item {% if 'products' in request.path or 'categories' in request.path %}active{% endif %}">
                <span class="icon">🍔</span> Gestionar Menú
            </a>
            <a href="{% url 'dashboard:staff_list' business.slug %}" class="nav-item {% if 'staff' in request.path %}active{% endif %}">
                <span class="icon">👥</span> Gestión Staff
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="dash-main">
        <div class="dash-content-wrapper">
            {% block dash_content %}{% endblock %}
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="{% url 'dashboard:waiter_dashboard' business.slug %}" class="mobile-nav-item {% if 'monitor' in request.path %}active{% endif %}">
            <span class="icon">🧑‍🍳</span>
            <span class="text">Monitor</span>
        </a>
        <a href="{% url 'dashboard:caja_dashboard' business.slug %}" class="mobile-nav-item {% if 'caja' in request.path %}active{% endif %}">
            <span class="icon">💰</span>
            <span class="text">Caja</span>
        </a>
        <a href="{% url 'dashboard:table_list' business.slug %}" class="mobile-nav-item {% if 'tables' in request.path %}active{% endif %}">
            <span class="icon">🪑</span>
            <span class="text">Mesas</span>
        </a>
        <a href="{% url 'dashboard:product_list' business.slug %}" class="mobile-nav-item {% if 'products' in request.path or 'categories' in request.path %}active{% endif %}">
            <span class="icon">🍔</span>
            <span class="text">Menú</span>
        </a>
    </nav>
</div>

<style>
    /* Dashboard Layout */
    .dash-container {
        display: flex;
        min-height: calc(100vh - 70px);
        background-color: var(--background);
    }

    /* Sidebar Desktop */
    .sidebar-desktop {
        width: 280px;
        background: white;
        border-right: 1px solid var(--border);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 70px;
        height: calc(100vh - 70px);
    }

    .sidebar-header { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; margin-bottom: 6px; letter-spacing: 0.5px; }
    .sidebar-header .business-name { margin: 0; font-size: 1.2rem; font-weight: 800; color: var(--secondary); }
    .sidebar-header .change-link { font-size: 0.8rem; color: var(--text-muted); text-decoration: underline; margin-top: 5px; display: inline-block; }

    /* Main Area */
    .dash-main {
        flex: 1;
        padding: 40px;
        position: relative;
    }

    .dash-content-wrapper {
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Mobile Nav Styles */
    .mobile-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: white;
        border-top: 1px solid var(--border);
        justify-content: space-around;
        padding: 10px 0;
        padding-bottom: env(safe-area-inset-bottom, 10px);
        z-index: 2000;
        box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
    }

    .mobile-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.7rem;
        font-weight: 700;
        gap: 4px;
        flex: 1;
    }

    .mobile-nav-item.active { color: var(--secondary); }
    .mobile-nav-item.active .icon { 
        background: var(--primary); 
        padding: 6px; 
        border-radius: 10px; 
        transform: translateY(-5px); 
        transition: 0.3s;
    }
    .mobile-nav-item .icon { font-size: 1.3rem; transition: 0.3s; }

    /* Responsive Breackpoints */
    @media (max-width: 1024px) {
        .sidebar-desktop { width: 220px; }
    }

    @media (max-width: 768px) {
        .sidebar-desktop { display: none; }
        .dash-main { padding: 20px; padding-bottom: 80px; }
        .mobile-nav { display: flex; }
        .dash-container { min-height: auto; }
    }
</style>
{% endblock %}
